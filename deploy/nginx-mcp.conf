# Nginx configuration for Open WebUI MCP Server
# Add this to your existing mcp.techmavie.digital server block
#
# Example: sudo nano /etc/nginx/sites-available/mcp.techmavie.digital
# Then add this location block inside the server { } block
#
# CORS is handled by the Express app - do NOT add CORS headers here
# to avoid double-header issues.

# This snippet intentionally does not claim global `/.well-known/...` routes.
# On the shared mcp.techmavie.digital host those exact locations collide with
# sibling MCP servers. Subpath-aware discovery still works through:
#   /openwebui/.well-known/mcp/server-card.json
#   /openwebui/.well-known/oauth-protected-resource/...
#   /openwebui/.well-known/oauth-authorization-server/...
# The rewrite below strips `/openwebui` before proxying, so the app still sees
# the standard `/.well-known/...` paths internally.

# Open WebUI MCP Server (port 8094)
location /openwebui/ {
    # Remove the /openwebui prefix when proxying
    rewrite ^/openwebui/(.*) /$1 break;

    # Proxy to the Docker container
    proxy_pass http://127.0.0.1:8094;

    # WebSocket and SSE support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Pass through auth headers
    proxy_set_header X-API-Key $http_x_api_key;

    # MCP-specific headers
    proxy_set_header Mcp-Session-Id $http_mcp_session_id;
    proxy_pass_header Mcp-Session-Id;

    # Timeouts for long-running requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    # Disable buffering for SSE
    proxy_buffering off;
    proxy_cache off;

    # Allow large request bodies
    client_max_body_size 10M;
}
